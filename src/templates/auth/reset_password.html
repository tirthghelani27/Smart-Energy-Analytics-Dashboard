{% extends "base.html" %}
{% block title %}Reset Password – Smart Energy Analytics{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo mb-2"><i class="fas fa-lock"></i></div>
      <h2>Set New Password</h2>
      <p class="text-muted small mt-1">Choose a strong password for your account.</p>
    </div>
    {% include "partials/flash_messages.html" %}
    <form method="POST">
      <input type="hidden" name="token" value="{{ token }}">

      <div class="mb-3">
        <label class="form-label" for="password">New Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Min 8 chars, 1 uppercase, 1 number" required
                 autocomplete="new-password">
          <button type="button" class="input-group-text toggle-password" data-target="#password"
                  style="cursor:pointer"><i class="fas fa-eye"></i></button>
        </div>
        <div class="mt-1">
          <div class="progress" style="height:4px;border-radius:2px">
            <div id="password-strength" class="progress-bar" style="width:0%;transition:width .3s"></div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label" for="confirm_password">Confirm New Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                 placeholder="Repeat password" required autocomplete="new-password">
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="fas fa-key me-2"></i>Update Password
      </button>
    </form>
    <p class="text-center text-muted small mt-4 mb-0">
      <a href="{{ url_for('auth.login') }}"><i class="fas fa-arrow-left me-1"></i>Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
