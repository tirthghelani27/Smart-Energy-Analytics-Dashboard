{% extends "base.html" %}
{% block title %}Login – Smart Energy Analytics{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo mb-2"><i class="fas fa-bolt"></i></div>
      <h2 class="mb-0">Welcome back</h2>
      <p class="text-muted small mt-1">Sign in to your Smart Energy account</p>
    </div>

    {% include "partials/flash_messages.html" %}

    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <div class="mb-3">
        <label class="form-label" for="identifier">Email or Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" class="form-control" id="identifier" name="identifier"
                 placeholder="you@example.com" required autocomplete="username">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="pwd">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="pwd" name="password"
                 placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="input-group-text toggle-password" data-target="#pwd"
                  style="cursor:pointer">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label small" for="remember">Remember me</label>
        </div>
        <a href="{{ url_for('auth.forgot_password') }}" class="small">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}">Create one free</a>
    </p>
  </div>
</div>
{% endblock %}
