{% extends "base.html" %}
{% block title %}403 – Access Denied{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:60vh">
  <div class="text-center">
    <div style="font-size:5rem;color:var(--se-danger);margin-bottom:1rem;">
      <i class="fas fa-shield-alt"></i>
    </div>
    <h1 class="display-4 fw-bold">403</h1>
    <h4 class="text-muted mb-3">Access Denied</h4>
    <p class="text-muted mb-4">
      You don't have permission to access this page.<br>
      Admin privileges are required.
    </p>
    <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('main.index') }}"
       class="btn btn-primary">
      <i class="fas fa-arrow-left me-2"></i>Go Back
    </a>
  </div>
</div>
{% endblock %}
