{% extends "base.html" %}
{% block title %}500 – Server Error{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:60vh">
  <div class="text-center">
    <div style="font-size:5rem;color:var(--se-danger);margin-bottom:1rem;">
      <i class="fas fa-exclamation-circle"></i>
    </div>
    <h1 class="display-4 fw-bold">500</h1>
    <h4 class="text-muted mb-3">Something Went Wrong</h4>
    <p class="text-muted mb-4">
      An unexpected error occurred. Our team has been notified.<br>
      Please try again in a few minutes.
    </p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">
      <i class="fas fa-home me-2"></i>Go Home
    </a>
  </div>
</div>
{% endblock %}
